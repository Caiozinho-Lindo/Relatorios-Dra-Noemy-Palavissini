<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Relatórios</title>
</head>

<body>

  <h2>Gerador de Relatórios</h2>

  <label>Nome do(a) Paciente:</label><br>
  <input id="paciente" type="text"><br><br>

  <label>Nome do(a) Estagiário(a):</label><br>
  <input id="estagiario" type="text"><br><br>

  <label>Data do Atendimento:</label><br>
  <input id="dataAtendimento" type="date"><br><br>

  <label>Data da Entrega do Registro:</label><br>
  <input id="dataEntrega" type="date"><br><br>

  <label>Objetivos Gerais e Específicos:</label><br>
  <textarea id="objetivos" rows="4"></textarea><br><br>

  <label>Estratégia:</label><br>
  <textarea id="estrategia" rows="4"></textarea><br><br>

  <label>Desenvolvimento:</label><br>
  <textarea id="desenvolvimento" rows="6"></textarea><br><br>

  <label>Planejamento / Conduta:</label><br>
  <textarea id="planejamento" rows="4"></textarea><br><br>

  <button onclick="gerarPDF()">Gerar PDF</button>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    function gerarPDF() {

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      let paciente = document.getElementById("paciente").value;
      let estagiario = document.getElementById("estagiario").value;
      let dataAtendimento = document.getElementById("dataAtendimento").value;
      let dataEntrega = document.getElementById("dataEntrega").value;

      let objetivos = document.getElementById("objetivos").value;
      let estrategia = document.getElementById("estrategia").value;
      let desenvolvimento = document.getElementById("desenvolvimento").value;
      let planejamento = document.getElementById("planejamento").value;

      let y = 20;

      doc.setFontSize(12);

      // TÍTULO
      doc.text("RELATÓRIO DE ATENDIMENTO", 20, y);
      y += 15;

      // IDENTIFICAÇÃO
      doc.text("Paciente: " + paciente, 20, y);
      y += 10;

      doc.text("Estagiário(a): " + estagiario, 20, y);
      y += 10;

      doc.text("Data do Atendimento: " + dataAtendimento, 20, y);
      y += 10;

      doc.text("Data da Entrega: " + dataEntrega, 20, y);
      y += 15;

      // FUNÇÃO AUXILIAR PARA TEXTO GRANDE
      function addTexto(titulo, texto) {
        doc.text(titulo, 20, y);
        y += 7;

        let linhas = doc.splitTextToSize(texto, 170);
        doc.text(linhas, 20, y);

        y += linhas.length * 7 + 8;
      }

      // CONTEÚDO
      addTexto("Objetivos Gerais e Específicos:", objetivos);
      addTexto("Estratégia:", estrategia);
      addTexto("Desenvolvimento:", desenvolvimento);
      addTexto("Planejamento / Conduta:", planejamento);

      // SALVAR PDF
      doc.save("Relatorio_" + paciente + ".pdf");
    }
  </script>

</body>
</html>
